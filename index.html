<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueHit™ Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.6); border-color: rgba(0, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 1); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 0.4); }
        }
        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 1. 頂部三足鼎立儀表板 */
        .dashboard-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 12px; }
        
        .thi-box {
            border: 2px solid #CCFF00; border-radius: 12px;
            padding: 6px; background: rgba(204, 255, 0, 0.05);
            text-align: center; width: 90px; height: 75px;
            display: flex; flex-direction: column; justify-content: center;
        }
        
        .player-box {
            border: 2px solid #00FFFF; border-radius: 12px;
            padding: 6px; background: rgba(0, 255, 255, 0.05);
            text-align: center; width: 90px; height: 75px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .ivr-indicator {
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid #00FFFF;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse-cyan 2s infinite; background: rgba(0, 255, 255, 0.05);
        }

        /* 2. 操作區域塔式堆疊 */
        .pressure-btn {
            height: 65px; /* 1.5倍高度 */
            background: #111; border: 1.5px solid #444; border-radius: 16px;
            color: #666; transition: all 0.3s;
        }
        .pressure-btn.active {
            background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .club-btn { 
            flex: 1; height: 58px; border: 1.5px solid #333; border-radius: 12px; 
            background: #0a0a0a; font-size: 11px; font-weight: 900; color: #666;
        }
        .club-btn.active { border-color: #00FFFF; background: rgba(0, 255, 255, 0.15); color: #00FFFF; }

        .grid-cell { 
            height: 54px; border: 2px solid #2a2a2a; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; background: #050505; color: #555;
        }
        .grid-cell.active { 
            background: #00FFFF; color: #000 !important; 
            font-size: 14px; border-color: #00FFFF;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); 
        }

        /* 3. 底部結果列 */
        .action-bar-item {
            flex: 1; height: 75px; display: flex; align-items: center; justify-content: center;
            border-radius: 20px; font-weight: 900; transition: all 0.1s;
        }
        .btn-miss { background-color: #111; border: 2px solid #333; color: #FF6D00; font-size: 32px; }
        .btn-perfect { background: linear-gradient(135deg, #00FFFF, #008888); color: #000; font-size: 20px; }
        
        .loading-overlay { background: rgba(0,0,0,1); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="px-5 py-4">

    <div id="loading" class="loading-overlay text-cyan-400 font-bold tracking-widest text-base">SYNCING...</div>

    <!-- 1. 頂部儀表板 -->
    <div class="dashboard-row">
        <!-- 左：Live THI (草黃綠) -->
        <div class="thi-box">
            <span class="text-zinc-500 text-[8px] font-black uppercase block">Live THI</span>
            <span id="thi-display" class="text-2xl font-black text-lime-400">+1.2</span>
        </div>
        
        <!-- 中：IVR sync (中心放大) -->
        <div class="ivr-indicator">
            <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">IVR sync</span>
            <span id="ivr-display" class="text-3xl font-black text-white">--%</span>
        </div>

        <!-- 右：Name & HDCP (天藍) -->
        <div class="player-box">
            <div id="player-name" class="text-white text-[11px] font-black leading-tight truncate">PLAYER</div>
            <div class="text-zinc-500 text-[8px] font-bold mt-1 uppercase tracking-tighter">HDCP</div>
            <div class="text-cyan-400 text-sm font-black italic">15.0</div>
        </div>
    </div>

    <!-- 2. AI 診斷與結算 (緊湊排列) -->
    <div id="ai-box" class="mb-2 p-3 rounded-xl border-l-4 border-cyan-500 bg-zinc-900/50">
        <div id="ai-text" class="text-sm font-bold text-zinc-100 leading-tight">請宣告壓力並選擇球桿。</div>
    </div>
    <button onclick="finalizeRound()" class="w-full py-2.5 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-600 font-black text-[9px] tracking-[0.2em] mb-4">
        FINALIZE SESSION
    </button>

    <!-- 3. 操作塔式堆疊 (間距嚴格 10px) -->
    <div class="flex flex-col flex-grow">
        
        <!-- 壓力層 (65px 高) -->
        <button id="pressure-toggle" onclick="togglePressure()" class="pressure-btn w-full font-black text-xs tracking-[0.4em]">
            🔥 PRESSURE MODE: OFF
        </button>
        
        <div class="h-[10px]"></div>

        <!-- 球桿層 (放大文字，無圖示) -->
        <div class="flex gap-1.5">
            <button class="club-btn" data-key="DRIVER" onclick="selectClub(this)">DRIVER</button>
            <button class="club-btn" data-key="FW" onclick="selectClub(this)">FW/HB</button>
            <button class="club-btn active" data-key="IRON" onclick="selectClub(this)">IRON</button>
            <button class="club-btn" data-key="WEDGE" onclick="selectClub(this)">WEDGE</button>
            <button class="club-btn" data-key="PUTTER" onclick="selectClub(this)">PUTTER</button>
        </div>

        <div class="h-[10px]"></div>

        <!-- 九宮格層 (壓縮高度) -->
        <div class="grid grid-cols-3 gap-2.5 w-full max-w-sm mx-auto">
            <div class="grid-cell" onclick="setIntent(0)">H.Draw</div>
            <div class="grid-cell" onclick="setIntent(1)">High</div>
            <div class="grid-cell" onclick="setIntent(2)">H.Fade</div>
            <div class="grid-cell" onclick="setIntent(3)">Draw</div>
            <div class="grid-cell active" onclick="setIntent(4)">CENTER</div>
            <div class="grid-cell" onclick="setIntent(5)">Fade</div>
            <div class="grid-cell" onclick="setIntent(6)">L.Draw</div>
            <div class="grid-cell" onclick="setIntent(7)">Low</div>
            <div class="grid-cell" onclick="setIntent(8)">L.Fade</div>
        </div>

        <div class="h-[10px]"></div>

        <!-- 底部結果確認 (平分寬度) -->
        <div class="flex items-center w-full gap-3 mb-2">
            <button onclick="sendShot(3, 2)" class="action-bar-item btn-miss active:scale-95">←</button>
            <button onclick="sendShot(4, 4)" class="action-bar-item btn-perfect active:scale-95">PERFECT</button>
            <button onclick="sendShot(5, 2)" class="action-bar-item btn-miss active:scale-95">→</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://truehitcloud-production.up.railway.app";
        let currentUserId = "anonymous";
        let currentClub = "IRON";
        let currentIntent = 4;
        let isPressure = false;

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010234920-mLFgwbeb" });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    document.getElementById('player-name').innerText = profile.displayName.toUpperCase();
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) { document.getElementById('loading').innerText = "ERROR: " + err.message; }
        }

        function togglePressure() {
            isPressure = !isPressure;
            const btn = document.getElementById('pressure-toggle');
            btn.classList.toggle('active');
            btn.innerText = isPressure ? "🔥 PRESSURE MODE: ON" : "🔥 PRESSURE MODE: OFF";
            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }

        function selectClub(el) {
            document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentClub = el.dataset.key;
        }

        function setIntent(pos) {
            currentIntent = pos;
            document.querySelectorAll('.grid-cell').forEach((c, idx) => {
                if(idx === pos) c.classList.add('active');
                else c.classList.remove('active');
            });
        }

        async function sendShot(missDir, missDeg) {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            const aiText = document.getElementById('ai-text');
            try {
                const response = await fetch(`${API_BASE}/calculate-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lineUserId: currentUserId, clubKey: currentClub, intended: currentIntent,
                        actual: missDir === 4 ? currentIntent : 4, missDir, missDeg, isPressure
                    })
                });
                const result = await response.json();
                document.getElementById('ivr-display').innerText = `${result.score}%`;
                aiText.innerText = result.score >= 100 ? "意圖同步成功！" : "偏差已記錄。";
            } catch (err) { aiText.innerText = "連線失敗。"; }
        }

        function finalizeRound() {
            if (confirm("確定要結算並結束球局嗎？")) { liff.closeWindow(); }
        }

        initLiff();
    </script>
</body>
</html>
