<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueHit™ Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); border-color: rgba(0, 255, 255, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 1); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 0.5); }
        }
        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 放大版 IVR 呼吸燈 */
        .ivr-indicator {
            width: 95px; height: 95px; border-radius: 50%; border: 4px solid #00FFFF;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse-cyan 2s infinite;
            background: rgba(0, 255, 255, 0.05);
        }

        /* Live THI 方格圓角方塊 (草黃綠邊框) */
        .thi-box {
            border: 2px solid #CCFF00;
            border-radius: 14px;
            padding: 10px 20px;
            background: rgba(204, 255, 0, 0.05);
            display: inline-block;
            min-width: 120px;
        }

        /* 放大版球桿按鈕 (無圖示) */
        .club-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            height: 52px; border: 1px solid #333; border-radius: 10px; background: #0a0a0a;
            font-size: 12px; font-weight: 900; color: #666; letter-spacing: 0.05em;
        }
        .club-btn.active { border-color: #00FFFF; background: rgba(0, 255, 255, 0.15); color: #00FFFF; transform: scale(1.02); }

        /* 縮小高度後的九宮格 (固定高度達成 1/3 縮放感) */
        .grid-cell { 
            height: 58px; border: 2.5px solid #2a2a2a; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; background: #050505; color: #555;
            text-align: center; line-height: 1.1;
        }
        .grid-cell.active { 
            background: #00FFFF; color: #000 !important; 
            font-size: 16px; border-color: #00FFFF;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); 
        }

        /* 底部三等分按鈕列 */
        .action-bar-item {
            flex: 1; height: 68px; display: flex; align-items: center; justify-content: center;
            border-radius: 18px; font-weight: 900; transition: all 0.1s;
        }
        .btn-miss { background-color: #111; border: 2px solid #333; color: #FF6D00; font-size: 32px; }
        .btn-perfect { background: linear-gradient(135deg, #00FFFF, #008888); color: #000; font-size: 20px; }
        
        .loading-overlay { background: rgba(0,0,0,1); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="px-6 py-4">

    <div id="loading" class="loading-overlay text-cyan-400 font-bold tracking-widest text-lg uppercase">Link Active...</div>

    <!-- 1. 頂部狀態列 -->
    <div class="flex justify-between items-center mb-4">
        <div class="flex flex-col gap-2">
            <span id="player-name" class="text-zinc-600 text-[10px] font-black tracking-widest uppercase">TRUEHIT PLAYER</span>
            <div class="thi-box">
                <span class="text-zinc-500 text-[9px] font-black uppercase block mb-0.5">LIVE THI</span>
                <span id="thi-display" class="text-3xl font-black text-lime-400">+1.2</span>
            </div>
        </div>
        <div class="ivr-indicator">
            <span class="text-[9px] font-black text-cyan-400 uppercase tracking-tighter">Sync</span>
            <span id="ivr-display" class="text-2xl font-black text-white">--%</span>
        </div>
    </div>

    <!-- 2. AI 診斷區 -->
    <div id="ai-box" class="mb-2 p-3.5 rounded-xl border-l-4 border-cyan-500 bg-zinc-900/80 shadow-lg">
        <div id="ai-label" class="text-cyan-400 text-[9px] font-black uppercase mb-0.5">Diagnostic AI</div>
        <div id="ai-text" class="text-base font-bold text-zinc-100 leading-tight tracking-tight">準備就緒，請開始記錄。</div>
    </div>

    <!-- 3. 結束球局按鈕 (AI 下方) -->
    <button onclick="finalizeRound()" class="w-full py-2.5 rounded-xl bg-zinc-900/50 border border-zinc-800 text-zinc-500 font-black text-[10px] tracking-widest mb-4 active:bg-zinc-800">
        🏁 結束球局並產出戰報 (FINALIZE)
    </button>

    <!-- 4. 球桿選擇 (放大、無圖示) -->
    <div class="flex gap-2 mb-4">
        <button class="club-btn" data-key="DRIVER" onclick="selectClub(this)">DRIVER</button>
        <button class="club-btn" data-key="FW" onclick="selectClub(this)">FW/HB</button>
        <button class="club-btn active" data-key="IRON" onclick="selectClub(this)">IRON</button>
        <button class="club-btn" data-key="WEDGE" onclick="selectClub(this)">WEDGE</button>
        <button class="club-btn" data-key="PUTTER" onclick="selectClub(this)">PUTTER</button>
    </div>

    <!-- 5. 壓力按鈕 -->
    <button id="pressure-toggle" onclick="togglePressure()" class="pressure-btn w-full py-2 mb-4 font-black text-[10px] tracking-[0.3em]">
        🔥 PRESSURE MODE: OFF
    </button>

    <!-- 6. 核心九宮格 (壓縮高度) -->
    <div class="flex-grow flex items-center mb-5">
        <div class="grid grid-cols-3 gap-3 w-full max-w-sm mx-auto">
            <div class="grid-cell" onclick="setIntent(0)">H.Draw</div>
            <div class="grid-cell" onclick="setIntent(1)">High</div>
            <div class="grid-cell" onclick="setIntent(2)">H.Fade</div>
            <div class="grid-cell" onclick="setIntent(3)">Draw</div>
            <div class="grid-cell active" onclick="setIntent(4)">CENTER</div>
            <div class="grid-cell" onclick="setIntent(5)">Fade</div>
            <div class="grid-cell" onclick="setIntent(6)">L.Draw</div>
            <div class="grid-cell" onclick="setIntent(7)">Low</div>
            <div class="grid-cell" onclick="setIntent(8)">L.Fade</div>
        </div>
    </div>

    <!-- 7. 底部三等分操作列 (PERFECT 無圖案) -->
    <div class="flex items-center w-full gap-3 pb-3">
        <button onclick="sendShot(3, 2)" class="action-bar-item btn-miss active:scale-95">←</button>
        <button onclick="sendShot(4, 4)" class="action-bar-item btn-perfect active:scale-95">PERFECT</button>
        <button onclick="sendShot(5, 2)" class="action-bar-item btn-miss active:scale-95">→</button>
    </div>

    <script>
        const API_BASE = "https://truehitcloud-production.up.railway.app";
        let currentUserId = "anonymous";
        let currentClub = "IRON";
        let currentIntent = 4;
        let isPressure = false;

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010234920-mLFgwbeb" });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    document.getElementById('player-name').innerText = profile.displayName.toUpperCase();
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) { document.getElementById('loading').innerText = "ERROR: " + err.message; }
        }

        function togglePressure() {
            isPressure = !isPressure;
            const btn = document.getElementById('pressure-toggle');
            btn.classList.toggle('active');
            btn.innerText = isPressure ? "🔥 PRESSURE MODE: ON" : "🔥 PRESSURE MODE: OFF";
            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }

        function selectClub(el) {
            document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentClub = el.dataset.key;
        }

        function setIntent(pos) {
            currentIntent = pos;
            document.querySelectorAll('.grid-cell').forEach((c, idx) => {
                if(idx === pos) c.classList.add('active');
                else c.classList.remove('active');
            });
        }

        async function sendShot(missDir, missDeg) {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            const aiText = document.getElementById('ai-text');
            const aiLabel = document.getElementById('ai-label');
            aiLabel.innerText = "SYNCING...";

            try {
                const response = await fetch(`${API_BASE}/calculate-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lineUserId: currentUserId, clubKey: currentClub, intended: currentIntent,
                        actual: missDir === 4 ? currentIntent : 4, missDir, missDeg, isPressure
                    })
                });
                const result = await response.json();
                document.getElementById('ivr-display').innerText = `${result.score}%`;
                aiLabel.innerText = result.score >= 100 ? "PURE STRIKE! 🔥" : "STRATEGY UPDATED";
                aiText.innerText = result.score >= 100 ? "完美同步！" : "系統已捕捉偏差模式。";
            } catch (err) {
                aiLabel.innerText = "OFFLINE";
                aiText.innerText = "連線失敗。";
            }
        }

        function finalizeRound() {
            if (confirm("確定要結算本場球局嗎？")) {
                liff.closeWindow();
            }
        }

        initLiff();
    </script>
</body>
</html>
