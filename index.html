<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueHit™ Strategy Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); border-color: rgba(0, 255, 255, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 1); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); border-color: rgba(0, 255, 255, 0.5); }
        }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .ivr-indicator {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid #00FFFF;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse-cyan 2s infinite;
        }

        .club-btn { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            padding: 8px 0; border: 1px solid #222; border-radius: 12px; background: #0a0a0a;
            transition: all 0.2s;
        }
        .club-btn.active { border-color: #00FFFF; background: rgba(0, 255, 255, 0.15); color: #00FFFF; transform: translateY(-2px); }

        .grid-cell { 
            aspect-ratio: 1 / 1; border: 1px solid #1a1a1a; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; background: #050505; transition: all 0.15s;
            color: #444; cursor: pointer;
        }
        .grid-cell.active { background: #00FFFF; color: #000 !important; font-size: 11px; box-shadow: 0 0 20px #00FFFF; border-color: #00FFFF; }

        .perfect-btn { 
            background: linear-gradient(135deg, #00FFFF, #008888); color: #000; 
            border-radius: 20px; font-weight: 900; box-shadow: 0 4px 25px rgba(0, 255, 255, 0.3);
        }
        .loading-overlay { background: rgba(0,0,0,0.8); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="flex flex-col h-screen px-5 py-4">

    <div id="loading" class="loading-overlay text-cyan-400 font-bold tracking-widest">INITIALIZING NEURAL LINK...</div>

    <!-- 1. 頂部狀態列 -->
    <div class="flex justify-between items-center mb-5 mt-2">
        <div class="flex flex-col">
            <span id="player-name" class="text-zinc-500 text-[10px] font-black tracking-widest uppercase">TRUEHIT PLAYER</span>
            <div class="flex items-baseline gap-1">
                <span class="text-zinc-500 text-xs font-bold">LIVE THI:</span>
                <span id="thi-display" class="text-2xl font-black text-lime-400">--</span>
            </div>
        </div>
        <div class="ivr-indicator">
            <span class="text-[8px] font-black text-cyan-400">SYNC</span>
            <span id="ivr-display" class="text-xl font-black">--%</span>
        </div>
    </div>

    <!-- 2. 中間：球桿五大類別 -->
    <div class="flex gap-1.5 mb-5">
        <button class="club-btn" data-key="DRIVER" onclick="selectClub(this)">
            <span class="text-base mb-1">🏌️</span>
            <span class="text-[8px] font-black uppercase">Driver</span>
        </button>
        <button class="club-btn" data-key="FW" onclick="selectClub(this)">
            <span class="text-base mb-1">🚀</span>
            <span class="text-[8px] font-black uppercase">FW/HB</span>
        </button>
        <button class="club-btn active" data-key="IRON" onclick="selectClub(this)">
            <span class="text-base mb-1">🎯</span>
            <span class="text-[8px] font-black uppercase">Iron</span>
        </button>
        <button class="club-btn" data-key="WEDGE" onclick="selectClub(this)">
            <span class="text-base mb-1">🛡️</span>
            <span class="text-[8px] font-black uppercase">Wedge</span>
        </button>
        <button class="club-btn" data-key="PUTTER" onclick="selectClub(this)">
            <span class="text-base mb-1">⛳</span>
            <span class="text-[8px] font-black uppercase">Putter</span>
        </button>
    </div>

    <!-- 3. 九宮格意圖區 -->
    <div class="flex-grow flex flex-col justify-center">
        <div class="grid grid-cols-3 gap-2.5 w-full max-w-xs mx-auto mb-8">
            <div class="grid-cell" onclick="setIntent(0)">H.Draw</div>
            <div class="grid-cell" onclick="setIntent(1)">High</div>
            <div class="grid-cell" onclick="setIntent(2)">H.Fade</div>
            <div class="grid-cell" onclick="setIntent(3)">Draw</div>
            <div class="grid-cell active" onclick="setIntent(4)">CENTER</div>
            <div class="grid-cell" onclick="setIntent(5)">Fade</div>
            <div class="grid-cell" onclick="setIntent(6)">L.Draw</div>
            <div class="grid-cell" onclick="setIntent(7)">Low</div>
            <div class="grid-cell" onclick="setIntent(8)">L.Fade</div>
        </div>

        <!-- 4. 結果回饋區 -->
        <div class="flex items-center gap-4 h-20 px-2">
            <button onclick="sendShot(3, 2)" class="w-14 h-14 bg-zinc-900 border border-zinc-800 rounded-full text-orange-500 text-2xl font-black active:scale-90 transition-transform">←</button>
            <button onclick="sendShot(4, 4)" class="flex-grow h-16 perfect-btn text-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="text-2xl">🎯</span> PERFECT
            </button>
            <button onclick="sendShot(5, 2)" class="w-14 h-14 bg-zinc-900 border border-zinc-800 rounded-full text-orange-500 text-2xl font-black active:scale-90 transition-transform">→</button>
        </div>
    </div>

    <!-- 5. 底部 AI 戰略回饋 -->
    <div id="ai-box" class="mt-4 bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 text-center">
        <p class="text-[10px] font-bold text-zinc-400">
            <span id="ai-label" class="text-cyan-400 uppercase tracking-tighter">Diagnostic Ready:</span> 
            <span id="ai-text">請選擇意圖座標並點擊擊球結果。</span>
        </p>
    </div>

    <script>
        const API_BASE = "https://truehitcloud-production.up.railway.app";
        let currentUserId = "anonymous";
        let currentClub = "IRON";
        let currentIntent = 4;
        let isPressure = false;

        // 初始化 LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: "2010234920-mLFgwbeb" });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    document.getElementById('player-name').innerText = profile.displayName.toUpperCase();
                }
                document.getElementById('loading').style.display = 'none';
           } catch (err) {
    console.error("LIFF Init Failed", err);
    // 這裡是關鍵：將錯誤訊息直接印在螢幕上
    document.getElementById('loading').innerText = "ERROR: " + err.code + " - " + err.message;
}
        }

        function selectClub(el) {
            document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentClub = el.dataset.key;
        }

        function setIntent(pos) {
            currentIntent = pos;
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach((c, idx) => {
                if(idx === pos) c.classList.add('active');
                else c.classList.remove('active');
            });
        }

        async function sendShot(missDir, missDeg) {
            // 觸發手機震動 (如果支援)
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            // 準備數據
            const payload = {
                lineUserId: currentUserId,
                clubKey: currentClub,
                intended: currentIntent,
                actual: missDir === 4 ? currentIntent : 4, // 簡化邏輯
                missDir: missDir,
                missDeg: missDeg,
                isPressure: isPressure
            };

            // 視覺反饋
            const aiText = document.getElementById('ai-text');
            const aiLabel = document.getElementById('ai-label');
            aiLabel.innerText = "SYNCING...";
            aiText.innerText = "正在將數據傳送至 TrueHit 雲端引擎...";

            try {
                const response = await fetch(`${API_BASE}/calculate-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                // 更新即時分數
                document.getElementById('ivr-display').innerText = `${result.score}%`;
                
                // 更新 AI 金句
                aiLabel.innerText = result.score >= 100 ? "PURE STRIKE! 🔥" : "SHOT RECORDED";
                aiText.innerText = result.score >= 100 ? "完美的意圖同步！保持目前的節奏與專注度。" : "執行略有偏差。請深呼吸，重置您的擊球程序。";
                
                // 成功動效：呼吸燈加速閃爍一次
                const indicator = document.querySelector('.ivr-indicator');
                indicator.style.animation = 'none';
                void indicator.offsetWidth; // 觸發重繪
                indicator.style.animation = 'pulse-cyan 0.5s 2';
                setTimeout(() => { indicator.style.animation = 'pulse-cyan 2s infinite'; }, 1000);

            } catch (err) {
                aiLabel.innerText = "OFFLINE";
                aiText.innerText = "無法連線至伺服器，請檢查網路狀態。";
            }
        }

        initLiff();
    </script>
</body>
</html>
