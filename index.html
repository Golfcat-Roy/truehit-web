<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueHit™ Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
        }
        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 緊湊型 IVR 呼吸燈 */
        .ivr-indicator {
            width: 60px; height: 60px; border-radius: 50%; border: 3px solid #00FFFF;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse-cyan 2s infinite;
        }

        /* 壓力按鈕 */
        .pressure-btn {
            background: #111; border: 1.5px solid #333; border-radius: 10px;
            transition: all 0.3s; color: #555;
        }
        .pressure-btn.active {
            background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        /* 球桿按鈕 */
        .club-btn { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            padding: 6px 0; border: 1px solid #222; border-radius: 8px; background: #0a0a0a; color: #666;
        }
        .club-btn.active { border-color: #00FFFF; background: rgba(0, 255, 255, 0.1); color: #00FFFF; }

        /* 九宮格加強 */
        .grid-cell { 
            aspect-ratio: 1 / 1; border: 1.5px solid #2a2a2a; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900; background: #050505; color: #444;
            text-align: center; line-height: 1.1;
        }
        .grid-cell.active { 
            background: #00FFFF; color: #000 !important; 
            font-size: 15px; border-color: #00FFFF;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); 
        }

        /* 底部三等分按鈕列 */
        .action-bar-item {
            flex: 1; height: 65px; display: flex; align-items: center; justify-content: center;
            border-radius: 16px; font-weight: 900; transition: all 0.1s;
        }
        .btn-miss { background-color: #111; border: 2px solid #333; color: #FF6D00; font-size: 28px; }
        .btn-perfect { background: linear-gradient(135deg, #00FFFF, #008888); color: #000; font-size: 18px; }
        
        .loading-overlay { background: rgba(0,0,0,1); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="px-5 py-3">

    <div id="loading" class="loading-overlay text-cyan-400 font-bold tracking-widest text-base uppercase">Neural Linking...</div>

    <!-- 1. 頂部狀態列 -->
    <div class="flex justify-between items-center mb-3">
        <div class="flex flex-col">
            <span id="player-name" class="text-zinc-600 text-[9px] font-black tracking-widest uppercase tracking-tighter">TRUEHIT PLAYER</span>
            <div class="flex items-baseline gap-1">
                <span class="text-zinc-500 text-[10px] font-bold uppercase">LIVE THI:</span>
                <span id="thi-display" class="text-xl font-black text-lime-400">--</span>
            </div>
        </div>
        <div class="ivr-indicator">
            <span class="text-[7px] font-black text-cyan-400 uppercase">Sync</span>
            <span id="ivr-display" class="text-lg font-black">--%</span>
        </div>
    </div>

    <!-- 2. AI 診斷區 -->
    <div id="ai-box" class="mb-2 p-3 rounded-xl border-l-4 border-cyan-500 bg-zinc-900 shadow-lg">
        <div id="ai-label" class="text-cyan-400 text-[9px] font-black uppercase tracking-widest mb-0.5">Diagnostic AI</div>
        <div id="ai-text" class="text-sm font-bold text-zinc-100 leading-tight">請設定擊球意圖並開始記錄。</div>
    </div>

    <!-- 3. 結束球局按鈕 (移至 AI 下方) -->
    <button onclick="finalizeRound()" class="w-full py-2.5 rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-500 font-black text-[10px] tracking-widest mb-3 active:bg-zinc-800">
        🏁 結束並結算目前球局 (FINALIZE)
    </button>

    <!-- 4. 球桿選擇列 -->
    <div class="flex gap-1.5 mb-3">
        <button class="club-btn" data-key="DRIVER" onclick="selectClub(this)"><span class="text-sm">🏌️</span><span class="text-[7px] font-bold mt-0.5">DRIVER</span></button>
        <button class="club-btn" data-key="FW" onclick="selectClub(this)"><span class="text-sm">🚀</span><span class="text-[7px] font-bold mt-0.5">FW/HB</span></button>
        <button class="club-btn active" data-key="IRON" onclick="selectClub(this)"><span class="text-sm">🎯</span><span class="text-[7px] font-bold mt-0.5">IRON</span></button>
        <button class="club-btn" data-key="WEDGE" onclick="selectClub(this)"><span class="text-sm">🛡️</span><span class="text-[7px] font-bold mt-0.5">WEDGE</span></button>
        <button class="club-btn" data-key="PUTTER" onclick="selectClub(this)"><span class="text-sm">⛳</span><span class="text-[7px] font-bold mt-0.5">PUTTER</span></button>
    </div>

    <!-- 5. 壓力按鈕 (九宮格上方) -->
    <button id="pressure-toggle" onclick="togglePressure()" class="pressure-btn w-full py-2 mb-3 font-black text-[10px] tracking-[0.2em]">
        🔥 PRESSURE MODE: OFF
    </button>

    <!-- 6. 核心九宮格 (彈性自動縮放) -->
    <div class="flex-grow flex items-center mb-4">
        <div class="grid grid-cols-3 gap-2 w-full max-w-sm mx-auto">
            <div class="grid-cell" onclick="setIntent(0)">H.Draw</div>
            <div class="grid-cell" onclick="setIntent(1)">High</div>
            <div class="grid-cell" onclick="setIntent(2)">H.Fade</div>
            <div class="grid-cell" onclick="setIntent(3)">Draw</div>
            <div class="grid-cell active" onclick="setIntent(4)">CENTER</div>
            <div class="grid-cell" onclick="setIntent(5)">Fade</div>
            <div class="grid-cell" onclick="setIntent(6)">L.Draw</div>
            <div class="grid-cell" onclick="setIntent(7)">Low</div>
            <div class="grid-cell" onclick="setIntent(8)">L.Fade</div>
        </div>
    </div>

    <!-- 7. 底部三等分操作列 (等高、平分寬度、PERFECT 無靶心) -->
    <div class="flex items-center w-full gap-2.5 pb-2">
        <button onclick="sendShot(3, 2)" class="action-bar-item btn-miss active:scale-95">←</button>
        <button onclick="sendShot(4, 4)" class="action-bar-item btn-perfect active:scale-95 text-center">PERFECT</button>
        <button onclick="sendShot(5, 2)" class="action-bar-item btn-miss active:scale-95">→</button>
    </div>

    <script>
        const API_BASE = "https://truehitcloud-production.up.railway.app";
        let currentUserId = "anonymous";
        let currentClub = "IRON";
        let currentIntent = 4;
        let isPressure = false;

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010234920-mLFgwbeb" });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    document.getElementById('player-name').innerText = profile.displayName.toUpperCase();
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) { document.getElementById('loading').innerText = "ERROR: " + err.message; }
        }

        function togglePressure() {
            isPressure = !isPressure;
            const btn = document.getElementById('pressure-toggle');
            btn.classList.toggle('active');
            btn.innerText = isPressure ? "🔥 PRESSURE MODE: ON" : "🔥 PRESSURE MODE: OFF";
            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }

        function selectClub(el) {
            document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentClub = el.dataset.key;
        }

        function setIntent(pos) {
            currentIntent = pos;
            document.querySelectorAll('.grid-cell').forEach((c, idx) => {
                if(idx === pos) c.classList.add('active');
                else c.classList.remove('active');
            });
        }

        async function sendShot(missDir, missDeg) {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            const aiText = document.getElementById('ai-text');
            const aiLabel = document.getElementById('ai-label');
            aiLabel.innerText = "SYNCING...";

            try {
                const response = await fetch(`${API_BASE}/calculate-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lineUserId: currentUserId, clubKey: currentClub, intended: currentIntent,
                        actual: missDir === 4 ? currentIntent : 4, missDir, missDeg, isPressure
                    })
                });
                const result = await response.json();
                document.getElementById('ivr-display').innerText = `${result.score}%`;
                aiLabel.innerText = result.score >= 100 ? "PURE STRIKE! 🔥" : "STRATEGY UPDATED";
                aiText.innerText = result.score >= 100 ? "意圖完美同步！保持專注。" : "系統已捕捉偏差。請重新設定節奏。";
            } catch (err) {
                aiLabel.innerText = "OFFLINE";
                aiText.innerText = "連線失敗，請檢查網路。";
            }
        }

        function finalizeRound() {
            if (confirm("確定要結束並產出戰報嗎？")) {
                liff.closeWindow();
            }
        }

        initLiff();
    </script>
</body>
</html>
