<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueHit™ Strategy Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
        }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 頂部 IVR 呼吸燈 */
        .ivr-indicator {
            width: 75px; height: 70px; border-radius: 50%; border: 4px solid #00FFFF;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse-cyan 2s infinite;
        }

        /* AI 診斷方塊區域放大 */
        #ai-box {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 2px solid #333;
            border-left: 6px solid #00FFFF; /* 側邊飾條增加辨識度 */
        }

        /* 球桿按鈕 */
        .club-btn { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            padding: 10px 0; border: 1px solid #222; border-radius: 12px; background: #0a0a0a;
            transition: all 0.2s;
        }
        .club-btn.active { border-color: #00FFFF; background: rgba(0, 255, 255, 0.15); color: #00FFFF; }

        /* 九宮格加強設計 */
        .grid-cell { 
            aspect-ratio: 1 / 1; 
            border: 2.5px solid #2a2a2a; /* 邊框加粗 */
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; /* 字體放大 */
            font-weight: 900; background: #050505; transition: all 0.15s;
            color: #666; cursor: pointer;
            text-align: center; line-height: 1.1;
        }
        .grid-cell.active { 
            background: #00FFFF; color: #000 !important; 
            font-size: 16px; 
            box-shadow: 0 0 25px #00FFFF; 
            border-color: #00FFFF; 
        }

        .perfect-btn { 
            background: linear-gradient(135deg, #00FFFF, #008888); color: #000; 
            border-radius: 20px; font-weight: 900; box-shadow: 0 4px 25px rgba(0, 255, 255, 0.3);
        }
        .loading-overlay { background: rgba(0,0,0,0.9); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="flex flex-col h-screen px-5 py-4">

    <div id="loading" class="loading-overlay text-cyan-400 font-bold tracking-widest text-lg">INITIALIZING NEURAL LINK...</div>

    <!-- 1. 頂部狀態列 -->
    <div class="flex justify-between items-center mb-4">
        <div class="flex flex-col">
            <span id="player-name" class="text-zinc-500 text-[10px] font-black tracking-widest uppercase">TRUEHIT PLAYER</span>
            <div class="flex items-baseline gap-1">
                <span class="text-zinc-500 text-xs font-bold">LIVE THI:</span>
                <span id="thi-display" class="text-2xl font-black text-lime-400">+1.2</span>
            </div>
        </div>
        <div class="ivr-indicator">
            <span class="text-[8px] font-black text-cyan-400 uppercase">Sync</span>
            <span id="ivr-display" class="text-xl font-black">--%</span>
        </div>
    </div>

    <!-- 2. AI 戰略建議區 (移至上方並放大) -->
    <div id="ai-box" class="mb-5 p-4 rounded-xl shadow-2xl">
        <div id="ai-label" class="text-cyan-400 text-xs font-black uppercase tracking-tighter mb-1">Diagnostic Ready:</div>
        <div id="ai-text" class="text-base font-bold text-zinc-100 leading-tight">
            請選擇意圖座標並點擊擊球結果。
        </div>
    </div>

    <!-- 3. 球桿類別 -->
    <div class="flex gap-2 mb-5">
        <button class="club-btn" data-key="DRIVER" onclick="selectClub(this)">
            <span class="text-xl mb-1">🏌️</span>
            <span class="text-[9px] font-black uppercase">Driver</span>
        </button>
        <button class="club-btn" data-key="FW" onclick="selectClub(this)">
            <span class="text-xl mb-1">🚀</span>
            <span class="text-[9px] font-black uppercase">FW/HB</span>
        </button>
        <button class="club-btn active" data-key="IRON" onclick="selectClub(this)">
            <span class="text-xl mb-1">🎯</span>
            <span class="text-[9px] font-black uppercase">Iron</span>
        </button>
        <button class="club-btn" data-key="WEDGE" onclick="selectClub(this)">
            <span class="text-xl mb-1">🛡️</span>
            <span class="text-[9px] font-black uppercase">Wedge</span>
        </button>
        <button class="club-btn" data-key="PUTTER" onclick="selectClub(this)">
            <span class="text-xl mb-1">⛳</span>
            <span class="text-[9px] font-black uppercase">Putter</span>
        </button>
    </div>

    <!-- 4. 九宮格意圖區 (加強邊框與字體) -->
    <div class="flex-grow flex flex-col justify-center">
        <div class="grid grid-cols-3 gap-3 w-full max-w-sm mx-auto mb-8">
            <div class="grid-cell" onclick="setIntent(0)">H.Draw</div>
            <div class="grid-cell" onclick="setIntent(1)">High</div>
            <div class="grid-cell" onclick="setIntent(2)">H.Fade</div>
            <div class="grid-cell" onclick="setIntent(3)">Draw</div>
            <div class="grid-cell active" onclick="setIntent(4)">CENTER</div>
            <div class="grid-cell" onclick="setIntent(5)">Fade</div>
            <div class="grid-cell" onclick="setIntent(6)">L.Draw</div>
            <div class="grid-cell" onclick="setIntent(7)">Low</div>
            <div class="grid-cell" onclick="setIntent(8)">L.Fade</div>
        </div>

        <!-- 5. 結果回饋區 -->
        <div class="flex items-center gap-5 h-20 px-2">
            <button onclick="sendShot(3, 2)" class="w-16 h-16 bg-zinc-900 border-2 border-zinc-700 rounded-full text-orange-500 text-3xl font-black active:scale-90 transition-transform">←</button>
            <button onclick="sendShot(4, 4)" class="flex-grow h-18 perfect-btn text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span class="text-2xl">🎯</span> PERFECT
            </button>
            <button onclick="sendShot(5, 2)" class="w-16 h-16 bg-zinc-900 border-2 border-zinc-700 rounded-full text-orange-500 text-3xl font-black active:scale-90 transition-transform">→</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://truehitcloud-production.up.railway.app";
        let currentUserId = "anonymous";
        let currentClub = "IRON";
        let currentIntent = 4;
        let isPressure = false;

        async function initLiff() {
            try {
                await liff.init({ liffId: 2010234920-mLFgwbeb });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    document.getElementById('player-name').innerText = profile.displayName.toUpperCase();
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                document.getElementById('loading').innerText = "ERROR: " + err.message;
            }
        }

        function selectClub(el) {
            document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentClub = el.dataset.key;
        }

        function setIntent(pos) {
            currentIntent = pos;
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach((c, idx) => {
                if(idx === pos) c.classList.add('active');
                else c.classList.remove('active');
            });
        }

        async function sendShot(missDir, missDeg) {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            const payload = {
                lineUserId: currentUserId,
                clubKey: currentClub,
                intended: currentIntent,
                actual: missDir === 4 ? currentIntent : 4,
                missDir: missDir,
                missDeg: missDeg,
                isPressure: isPressure
            };

            const aiText = document.getElementById('ai-text');
            const aiLabel = document.getElementById('ai-label');
            aiLabel.innerText = "SYNCING...";
            aiLabel.classList.add('animate-pulse');

            try {
                const response = await fetch(`${API_BASE}/calculate-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                document.getElementById('ivr-display').innerText = `${result.score}%`;
                aiLabel.classList.remove('animate-pulse');
                aiLabel.innerText = result.score >= 100 ? "PURE STRIKE! 🔥" : "STRATEGY UPDATED";
                aiText.innerText = result.score >= 100 ? "完美的意圖同步！保持目前的節奏與專注度。" : "執行略有偏差。系統已記錄失誤模組，請重置節奏。";
                
                const indicator = document.querySelector('.ivr-indicator');
                indicator.style.animation = 'none';
                void indicator.offsetWidth;
                indicator.style.animation = 'pulse-cyan 0.5s 2';
                setTimeout(() => { indicator.style.animation = 'pulse-cyan 2s infinite'; }, 1000);

            } catch (err) {
                aiLabel.innerText = "OFFLINE";
                aiText.innerText = "伺服器連線中斷，請確認網路狀態。";
            }
        }

        initLiff();
    </script>
</body>
</html>
